<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro | Fully Fixed Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .sidebar-transition { transition: all 0.3s ease; }
        .tab-content { display: none; }
        .active-tab { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { background: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
        .type-active { background: #2563eb; color: white; border-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen">

    <!-- Mobile Sidebar Overlay -->
    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>

    <!-- 1. SIDEBAR -->
    <aside id="sidebar" class="sidebar-transition fixed lg:static inset-y-0 left-0 w-64 bg-slate-900 text-slate-400 transform -translate-x-full lg:translate-x-0 z-50 flex flex-col shadow-2xl">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <span class="text-white font-bold text-xl flex items-center gap-2">
                <i data-lucide="shield-check" class="text-blue-500"></i> ADMIN PRO
            </span>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('users-sec', this)" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl nav-active transition">
                <i data-lucide="users"></i> <span>User Handle</span>
            </button>
            <button onclick="switchTab('products-sec', this)" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl transition hover:bg-slate-800">
                <i data-lucide="package"></i> <span>Product Section</span>
            </button>
            <button onclick="switchTab('notif-sec', this)" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl transition hover:bg-slate-800">
                <i data-lucide="bell"></i> <span>Notifications</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-800 text-[10px] text-center font-bold text-slate-600">FIREBASE v10.7.1 STABLE</div>
    </aside>

    <!-- 2. MAIN AREA -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- HEADER -->
        <header class="h-20 bg-white border-b px-6 flex items-center justify-between shadow-sm sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-slate-100 rounded-lg"><i data-lucide="menu"></i></button>
                <h1 id="tab-title" class="text-lg lg:text-xl font-bold text-slate-800 uppercase tracking-wide">User Handle</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-slate-400">SYNCING LIVE</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-8">

            <!-- SECTION: USER HANDLE -->
            <section id="users-sec" class="tab-content active-tab space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm max-w-xl">
                    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase">Register New User</h3>
                    <div class="flex gap-2">
                        <input type="text" id="uName" placeholder="Enter Full Name" class="flex-1 border p-3 rounded-xl outline-none bg-slate-50 focus:ring-2 focus:ring-blue-500">
                        <button onclick="addUser()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg">Add User</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden flex flex-col">
                        <div class="p-4 bg-slate-50 border-b font-bold flex justify-between">Active Users <span id="actCount" class="text-blue-600 text-xs bg-blue-50 px-2 py-1 rounded">0</span></div>
                        <div id="activeList" class="divide-y overflow-y-auto max-h-[400px]"></div>
                    </div>
                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden flex flex-col">
                        <div class="p-4 bg-red-50 border-b font-bold text-red-600 flex justify-between">Recycle Bin <span id="delCount" class="text-red-400 text-xs bg-red-50 px-2 py-1 rounded">0</span></div>
                        <div id="deletedList" class="divide-y overflow-y-auto max-h-[400px]"></div>
                    </div>
                </div>
            </section>

            <!-- SECTION: PRODUCT MANAGEMENT -->
            <section id="products-sec" class="tab-content space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <!-- Type Selector -->
                    <div class="flex flex-wrap gap-2 mb-6 border-b pb-4">
                        <button onclick="setProductType('pdf', this)" class="type-btn px-6 py-2 rounded-full border-2 font-bold text-sm type-active transition-all">PDF File</button>
                        <button onclick="setProductType('docx', this)" class="type-btn px-6 py-2 rounded-full border-2 border-slate-200 text-slate-500 font-bold text-sm transition-all">Docx File</button>
                        <button onclick="setProductType('image', this)" class="type-btn px-6 py-2 rounded-full border-2 border-slate-200 text-slate-500 font-bold text-sm transition-all">Image File</button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <input type="hidden" id="pId">
                        <div class="space-y-4">
                            <input type="text" id="pTitle" placeholder="Product Title" class="w-full border p-3 rounded-xl outline-none bg-slate-50">
                            <input type="text" id="pCat" placeholder="Category" class="w-full border p-3 rounded-xl outline-none bg-slate-50">
                            <input type="text" id="pFileUrl" placeholder="Google Drive Link (File)" class="w-full border p-3 rounded-xl outline-none bg-slate-50">
                            
                            <div class="p-4 bg-slate-100 rounded-2xl border flex items-center gap-6">
                                <div class="flex items-center gap-4">
                                    <label class="flex items-center gap-1 font-bold text-green-600 cursor-pointer"><input type="radio" name="pAccess" value="free" checked onchange="togglePrice(false)"> FREE</label>
                                    <label class="flex items-center gap-1 font-bold text-red-600 cursor-pointer"><input type="radio" name="pAccess" value="paid" onchange="togglePrice(true)"> PAID</label>
                                </div>
                                <div id="pPriceBox" class="hidden flex-1 animate-fadeIn">
                                    <div class="relative">
                                        <span class="absolute left-3 top-2.5 font-bold text-slate-400">₹</span>
                                        <input type="number" id="pPrice" placeholder="Enter Price" class="w-full pl-8 p-2.5 border-none rounded-lg outline-none font-bold">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <input type="text" id="pImgUrl" oninput="runPreview(this.value)" placeholder="Google Drive Image URL" class="w-full border p-3 rounded-xl outline-none bg-slate-50">
                            
                            <!-- PREVIEW BOX (FIXED) -->
                            <div id="previewBox" class="h-36 w-full rounded-2xl border-2 border-dashed border-slate-200 bg-slate-50 overflow-hidden flex items-center justify-center relative">
                                <img id="pLiveImg" src="" class="hidden w-full h-full object-cover">
                                <div id="pLabel" class="text-slate-300 text-center">
                                    <i data-lucide="image" class="mx-auto mb-1"></i>
                                    <p class="text-[10px] font-bold">IMAGE PREVIEW</p>
                                </div>
                            </div>
                            <textarea id="pDesc" placeholder="Product Description..." class="w-full border p-3 rounded-xl outline-none bg-slate-50 h-16"></textarea>
                        </div>
                        <button onclick="saveProduct()" id="pBtn" class="lg:col-span-2 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition">Save Product</button>
                    </div>
                </div>

                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6"></div>
            </section>

            <!-- SECTION: NOTIFICATIONS -->
            <section id="notif-sec" class="tab-content space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm max-w-xl">
                    <input type="hidden" id="nId">
                    <div class="space-y-4">
                        <input type="text" id="nTitle" placeholder="Notification Title" class="w-full border p-3 rounded-xl outline-none bg-slate-50">
                        <textarea id="nMsg" placeholder="Message to Users..." class="w-full border p-3 rounded-xl outline-none bg-slate-50 h-24"></textarea>
                        <button onclick="saveNotif()" id="nBtn" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl hover:bg-purple-700">Published Notification</button>
                    </div>
                </div>
                <div id="notifList" class="space-y-3"></div>
            </section>

        </main>
    </div>

    <!-- FIREBASE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 Replace your Config Here
        const firebaseConfig = {
            apiKey: "your",
            authDomain: "your",
            databaseURL: "your",
            projectId: "your",
            storageBucket: "your",
            messagingSenderId: "your",
            appId: "your",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GLOBAL VARIABLES & UTILS ---
        let currentType = 'pdf'; 

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        };

        window.switchTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
            document.getElementById('tab-title').innerText = btn.innerText;
            if(window.innerWidth < 1024) toggleSidebar();
        };

        window.togglePrice = (show) => {
            document.getElementById('pPriceBox').style.display = show ? 'block' : 'none';
        };

        // --- PREVIEW & LINK FIX ---
        window.getCleanLink = (url) => {
            if(!url) return "";
            const idMatch = url.match(/[-\w]{25,}/);
            if (idMatch && (url.includes('drive.google.com') || url.includes('google.com'))) {
                return `https://lh3.googleusercontent.com/d/${idMatch[0]}`;
            }
            return url;
        };

        window.runPreview = (url) => {
            const img = document.getElementById('pLiveImg');
            const label = document.getElementById('pLabel');
            const cleanUrl = getCleanLink(url);
            if(url.trim() !== "") {
                img.src = cleanUrl;
                img.onload = () => { img.classList.remove('hidden'); label.classList.add('hidden'); };
                img.onerror = () => { img.classList.add('hidden'); label.classList.remove('hidden'); };
            } else {
                img.classList.add('hidden'); label.classList.remove('hidden');
            }
        };

        // --- USER LOGIC ---
        window.addUser = async () => {
            const name = document.getElementById('uName').value.trim();
            if(!name) return alert("Enter Name");
            await addDoc(collection(db, "users"), { name, isBlocked: false, isDeleted: false, ts: serverTimestamp() });
            document.getElementById('uName').value = '';
        };

        onSnapshot(query(collection(db, "users"), orderBy("ts", "desc")), (snap) => {
            const act = document.getElementById('activeList');
            const del = document.getElementById('deletedList');
            let aC = 0, dC = 0; act.innerHTML = ''; del.innerHTML = '';
            
            snap.forEach(d => {
                const u = d.data();
                const card = `<div class="p-4 flex items-center justify-between">
                    <div><p class="${u.isBlocked?'text-slate-300 line-through font-normal':'text-slate-700 font-bold'}">${u.name}</p></div>
                    <div class="flex gap-2">
                        ${!u.isDeleted ? `
                            <button onclick="updateU('${d.id}',{isBlocked:${!u.isBlocked}})" class="p-2 bg-slate-100 rounded-lg transition hover:bg-amber-100 text-amber-600"><i data-lucide="${u.isBlocked?'unlock':'lock'}" class="w-4 h-4"></i></button>
                            <button onclick="updateU('${d.id}',{isDeleted:true})" class="p-2 bg-slate-100 rounded-lg transition hover:bg-red-50 text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        ` : `
                            <button onclick="updateU('${d.id}',{isDeleted:false})" class="p-2 bg-green-100 text-green-700 rounded-lg"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                            <button onclick="pDel('${d.id}')" class="p-2 bg-red-600 text-white rounded-lg"><i data-lucide="x-circle" class="w-4 h-4"></i></button>
                        `}
                    </div>
                </div>`;
                u.isDeleted ? (del.innerHTML += card, dC++) : (act.innerHTML += card, aC++);
            });
            document.getElementById('actCount').innerText = aC;
            document.getElementById('delCount').innerText = dC;
            lucide.createIcons();
        });

        window.updateU = async (id, data) => await updateDoc(doc(db, "users", id), data);
        window.pDel = async (id) => confirm("Permanent Delete?") && await deleteDoc(doc(db, "users", id));

        // --- PRODUCT LOGIC (FIXED) ---
        window.setProductType = (type, btn) => {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => {
                b.classList.remove('type-active', 'bg-blue-600', 'text-white', 'border-blue-600');
                b.classList.add('border-slate-200', 'text-slate-500');
            });
            btn.classList.add('type-active', 'bg-blue-600', 'text-white', 'border-blue-600');
            btn.classList.remove('border-slate-200', 'text-slate-500');
        };

        window.saveProduct = async () => {
            const id = document.getElementById('pId').value;
            const status = document.querySelector('input[name="pAccess"]:checked').value;
            const data = {
                title: document.getElementById('pTitle').value,
                cat: document.getElementById('pCat').value,
                fileUrl: document.getElementById('pFileUrl').value,
                imgUrl: document.getElementById('pImgUrl').value,
                desc: document.getElementById('pDesc').value,
                status: status,
                price: status === 'paid' ? document.getElementById('pPrice').value : '0',
                type: currentType,
                ts: serverTimestamp()
            };

            if(!data.title || !data.fileUrl) return alert("Fill essential fields!");

            id ? await updateDoc(doc(db, "products", id), data) : await addDoc(collection(db, "products"), data);
            
            // Reset
            ['pId','pTitle','pCat','pFileUrl','pImgUrl','pDesc','pPrice'].forEach(f => document.getElementById(f).value = '');
            runPreview('');
            document.getElementById('pBtn').innerText = "Save Product";
        };

        onSnapshot(query(collection(db, "products"), orderBy("ts", "desc")), (snap) => {
            const grid = document.getElementById('productGrid'); grid.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="bg-white rounded-3xl border shadow-sm overflow-hidden flex flex-col group">
                    <div class="h-32 bg-slate-100 relative">
                        <img src="${getCleanLink(p.imgUrl)}" class="w-full h-full object-cover">
                        <span class="absolute top-2 right-2 text-[8px] font-bold px-2 py-1 bg-white rounded uppercase text-slate-500">${p.type}</span>
                        <span class="absolute bottom-2 left-2 text-[8px] font-bold px-2 py-1 rounded bg-slate-900 text-white uppercase tracking-widest">
                            ${p.status == 'free' ? 'FREE' : '₹' + p.price}
                        </span>
                    </div>
                    <div class="p-4 flex-1">
                        <h4 class="font-bold text-xs truncate">${p.title}</h4>
                        <div class="flex gap-4 mt-3 border-t pt-2">
                            <button onclick="editProd('${d.id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})" class="text-[10px] font-bold text-blue-600">EDIT</button>
                            <button onclick="deleteDoc(doc(db,'products','${d.id}'))" class="text-[10px] font-bold text-red-500">DELETE</button>
                        </div>
                    </div>
                </div>`;
            });
        });

        window.editProd = (id, p) => {
            document.getElementById('pId').value = id;
            document.getElementById('pTitle').value = p.title;
            document.getElementById('pCat').value = p.cat;
            document.getElementById('pFileUrl').value = p.fileUrl;
            document.getElementById('pImgUrl').value = p.imgUrl;
            document.getElementById('pDesc').value = p.desc;
            document.querySelector(`input[name="pAccess"][value="${p.status}"]`).checked = true;
            togglePrice(p.status === 'paid');
            if(p.status === 'paid') document.getElementById('pPrice').value = p.price;
            runPreview(p.imgUrl);
            
            // Set correct Type Tab
            const tabs = document.querySelectorAll('.type-btn');
            tabs.forEach(t => {
                if(t.innerText.toLowerCase().includes(p.type)) setProductType(p.type, t);
            });

            document.getElementById('pBtn').innerText = "Update Product";
            document.querySelector('main').scrollTo({top: 0, behavior: 'smooth'});
        };

        // --- NOTIF LOGIC ---
        window.saveNotif = async () => {
            const id = document.getElementById('nId').value;
            const data = { title: document.getElementById('nTitle').value, message: document.getElementById('nMsg').value, ts: serverTimestamp() };
            id ? await updateDoc(doc(db, "notifications", id), data) : await addDoc(collection(db, "notifications"), data);
            document.getElementById('nId').value = ''; document.getElementById('nTitle').value = ''; document.getElementById('nMsg').value = '';
            document.getElementById('nBtn').innerText = "Publish Notification";
        };

        onSnapshot(query(collection(db, "notifications"), orderBy("ts", "desc")), (snap) => {
            const list = document.getElementById('notifList'); list.innerHTML = '';
            snap.forEach(d => {
                const n = d.data();
                list.innerHTML += `<div class="p-4 bg-white rounded-2xl border flex justify-between items-center shadow-sm">
                    <div class="min-w-0 pr-4"><h5 class="font-bold text-sm text-slate-800 truncate">${n.title}</h5><p class="text-[10px] text-slate-500 truncate">${n.message}</p></div>
                    <div class="flex gap-2">
                        <button onclick="editNotif('${d.id}','${n.title}','${n.message}')" class="text-blue-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteDoc(doc(db,'notifications','${d.id}'))" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>`;
            });
            lucide.createIcons();
        });

        window.editNotif = (id, t, m) => {
            document.getElementById('nId').value = id;
            document.getElementById('nTitle').value = t;
            document.getElementById('nMsg').value = m;
            document.getElementById('nBtn').innerText = "Update Notif";
        };

        lucide.createIcons();
        window.db = db; window.doc = doc; window.deleteDoc = deleteDoc;
    </script>
</body>
</html>
